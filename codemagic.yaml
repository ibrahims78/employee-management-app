workflows:
  replit-to-apk:
    name: Replit Mobile Build
    working_directory: mobile 
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home
    scripts:
      - name: Reconstruct Android Files
        script: |
          # حذف مجلد أندرويد القديم الخاص بـ Replit (لأنه يسبب المشكلة)
          rm -rf android
          
          # إجبار Flutter على إعادة إنشاء مجلد أندرويد حديث ونظيف تماماً
          flutter create . --platforms=android
          
          # تثبيت المكتبات
          flutter pub get
      - name: Build APK
        script: |
          # البناء الآن سيتم باستخدام ملفات الأندرويد الجديدة
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
workflows:
  android-apk-workflow:
    name: Android Mobile Build (Compatibility Mode)
    # الدخول التلقائي لمجلد المشروع
    working_directory: mobile 
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      # نستخدم إصدار 3.19.6 بدلاً من stable لتجنب تعارض Gradle
      flutter: 3.19.6
      vars:
        JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-17.jdk/Contents/Home
    scripts:
      - name: Prepare and Build
        script: |
          # تنظيف أي ملفات بناء قديمة
          flutter clean
          
          # تحميل المكتبات (Dependencies)
          flutter pub get
          
          # بناء ملف APK
          # أضفنا --no-tree-shake-icons لتجنب فشل بناء الأيقونات في الإصدارات القديمة
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      # المسار الذي سيجد فيه Codemagic الملف لتحميله
      - build/app/outputs/flutter-apk/app-release.apk
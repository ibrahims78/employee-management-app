name: staff_health_mobile
description: A new Flutter project for Staff Health Management.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  dartz: ^0.10.1
